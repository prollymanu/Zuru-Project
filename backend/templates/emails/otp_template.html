<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .body { background-color: #F3F4F6; padding: 40px 20px; font-family: -apple-system, sans-serif; }
        .card { background: #ffffff; max-width: 500px; margin: 0 auto; border-radius: 16px; padding: 32px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .logo { color: #BB0000; font-size: 24px; font-weight: 800; letter-spacing: -1px; text-align: center; margin-bottom: 24px; }
        .title { font-size: 20px; font-weight: 600; color: #111827; margin-bottom: 8px; text-align: center; }
        .text { color: #4B5563; line-height: 1.5; text-align: center; font-size: 15px; }
        .otp-container { background: #111827; border-radius: 12px; padding: 20px; margin: 24px 0; text-align: center; }
        .otp-code { font-family: 'Courier New', Courier, monospace; color: #ffffff; font-size: 36px; font-weight: 700; letter-spacing: 8px; }
        .footer { margin-top: 32px; font-size: 12px; color: #9CA3AF; text-align: center; border-top: 1px solid #E5E7EB; padding-top: 24px; }
    </style>
</head>
<body class="body">
    <div class="card">
        <div class="logo">ZURU.</div>
        <h2 class="title">Verify your identity</h2>
        <p class="text">Welcome to the exclusive Zuru community. Use the secure code below to complete your registration.</p>
        <div class="otp-container">
            <span class="otp-code">{{ otp_code }}</span>
        </div>
        <p class="text" style="font-size: 13px;">This code expires in 10 minutes. If you didn't request this, you can safely ignore this email.</p>
        <div class="footer">
            &copy; 2026 Zuru Inc. <br>
            Nairobi, Kenya
        </div>
    </div>
</body>
</html>
